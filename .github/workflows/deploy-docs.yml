
name: deploy-docs

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy-gh-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: install pnpm
        uses: pnpm/action-setup@v2
        with:
          run_install: false
          version: 8

      - name: setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/vuepress/pnpm-lock.yaml

      - name: install dependencies
        run: pnpm install --dir web/vuepress --frozen-lockfile

      - name: build
        working-directory: web/vuepress
        env:
          NODE_OPTIONS: --max_old_space_size=8192
        run: |-
          pnpm run docs:build
          > .vuepress/dist/.nojekyll

      - name: deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: web/vuepress/.vuepress/dist
